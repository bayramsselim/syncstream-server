<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncStream Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <div class="play-icon"></div>
                <h1>SyncStream</h1>
            </div>
            <div class="status-indicator offline" id="connection-status"></div>
        </header>

        <main>
            <div id="setup-view" class="view active">
                <p class="subtitle">Watch videos in sync with friends.</p>
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your name" autocomplete="off">
                </div>

                <div class="action-buttons">
                    <button id="create-room-btn" class="btn primary-btn">
                        <span class="icon">✦</span> Create New Room
                    </button>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="input-group">
                        <input type="text" id="room-code-input" placeholder="Enter Room Code" autocomplete="off">
                    </div>
                    <button id="join-room-btn" class="btn secondary-btn">
                        Join Existing Room
                    </button>
                </div>
            </div>

            <div id="room-view" class="view">
                <div class="room-header">
                    <span class="room-label">Current Room:</span>
                    <div class="room-code-container">
                        <h2 id="current-room-code">ABCD</h2>
                        <button id="copy-code-btn" title="Copy room code">⎘</button>
                    </div>
                    <button id="copy-link-btn" style="width:100%; margin-top:8px; background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.4); color:#a5b4fc; padding:7px; border-radius:7px; cursor:pointer; font-size:12px; font-family:inherit;">🔗 Share Link</button>
                </div>

                <div class="users-section">
                    <h3>Participants (<span id="user-count">1</span>)</h3>
                    <ul id="users-list" class="users-list">
                        <!-- User list will be populated here -->
                    </ul>
                </div>

                <div class="now-playing-box" style="background: var(--glass-bg); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; border: 1px solid var(--glass-border);">
                    <span style="color: var(--text-secondary);">Now Playing:</span><br>
                    <strong id="now-playing-title" style="color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-top: 4px;">Waiting for video...</strong>
                </div>

                <div class="controls-section">
                    <div id="host-controls" style="display: none; margin-bottom: 12px; background: rgba(99, 102, 241, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(99, 102, 241, 0.3);">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer;">
                            <input type="checkbox" id="host-control-checkbox" style="width: auto;">
                            Only Host Can Control Video
                        </label>
                    </div>
                    <button id="leave-room-btn" class="btn danger-btn">Leave Room</button>
                </div>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
