<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SyncStream Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { width: 300px; padding: 20px; background: #050508; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }

        h2 { font-size: 16px; color: #6366f1; font-weight: 700; letter-spacing: 0.05em; }
        p  { font-size: 11px; color: #555; margin-top: 4px; }

        .view { display: none; flex-direction: column; gap: 14px; }
        .active { display: flex; }

        input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 11px 14px; border-radius: 10px; outline: none;
            font-size: 13px; width: 100%; transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #444; }

        button {
            background: #6366f1; color: #fff; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-size: 13px; width: 100%;
            transition: background 0.2s, transform 0.15s;
        }
        button:hover  { background: #4f46e5; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .btn-secondary { background: rgba(255,255,255,0.07); }
        .btn-secondary:hover { background: rgba(255,255,255,0.13); }
        .btn-danger    { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ef4444; display: inline-block;
            transition: background 0.4s; box-shadow: 0 0 6px currentColor;
        }
        .status-dot.connected    { background: #10b981; }
        .status-dot.connecting   { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

        .room-card {
            background: rgba(99,102,241,0.08);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 12px; padding: 16px; text-align: center;
        }
        .room-label { font-size: 10px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
        .room-code  { font-size: 32px; font-weight: 800; color: #818cf8; letter-spacing: 6px; margin: 8px 0; font-variant-numeric: tabular-nums; }

        .user-list  { display: flex; flex-direction: column; gap: 6px; max-height: 130px; overflow-y: auto; }
        .user-item  { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #ccc; }
        .user-av    { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #111; flex-shrink: 0; }

        .np-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px 12px; }
        .np-label { font-size: 10px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
        .np-title { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: none; display: block; }
        .np-title[href]:not([href=""]):not([href="#"]) { color: #818cf8; cursor: pointer; }
        .np-title[href]:not([href=""]):not([href="#"]):hover { color: #a5b4fc; text-decoration: underline; }

        .row { display: flex; gap: 8px; }
        .row button { flex: 1; }

        .hint { font-size: 11px; color: #444; text-align: center; }

        .connecting-msg { font-size: 12px; color: #f59e0b; text-align: center; animation: pulse 1.2s infinite; }
    </style>
</head>
<body>

    <!-- Step 1: Name -->
    <div id="view-init" class="view active">
        <div class="header">
            <h2>SYNCSTREAM PRO</h2>
            <span class="status-dot" id="status-dot"></span>
        </div>
        <p>Watch videos together in real-time.</p>
        <input id="name-in" placeholder="Your display name..." maxlength="24" autocomplete="off">
        <button id="btn-next">CONTINUE →</button>
    </div>

    <!-- Step 2: Create or Join -->
    <div id="view-action" class="view">
        <div class="header">
            <h2>Hello, <span id="user-name-label"></span>!</h2>
            <span class="status-dot" id="status-dot-2"></span>
        </div>
        <button id="btn-create">CREATE ROOM</button>
        <div class="hint">— or join an existing room —</div>
        <input id="join-code-in" placeholder="Room code (e.g. A1B2)" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:4px;text-align:center;">
        <button id="btn-join" class="btn-secondary">JOIN ROOM</button>
        <button id="btn-back" class="btn-secondary" style="font-size:11px;padding:8px;">← Back</button>
        <div id="connecting-msg" class="connecting-msg" style="display:none;">Connecting to server...</div>
    </div>

    <!-- Step 3: Room view -->
    <div id="view-room" class="view">
        <div class="room-card">
            <div class="room-label">Share this code</div>
            <div class="room-code" id="room-code-display">----</div>
            <div class="row">
                <button id="btn-copy" class="btn-secondary">Copy Code</button>
                <button id="btn-share" class="btn-secondary">Share Link</button>
            </div>
        </div>

        <div id="user-list" class="user-list"></div>

        <div class="np-box">
            <div class="np-label">Now watching</div>
            <a class="np-title" id="now-playing-title" href="#" target="_blank">Scanning...</a>
        </div>

        <div id="host-controls" style="display:none; align-items:center; gap:8px; font-size:12px; color:#aaa;">
            <input type="checkbox" id="host-control-only" style="width:auto;">
            <label for="host-control-only">Only host can control video</label>
        </div>

        <button id="btn-leave" class="btn-danger">Leave Room</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
