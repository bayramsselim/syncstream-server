<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SyncStream Pro</title>
    <style>
        body { width: 300px; padding: 20px; background: #000; color: #fff; font-family: sans-serif; }
        .view { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        h2 { font-size: 18px; margin: 0; color: #6366f1; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        button { background: #6366f1; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        button:hover { background: #4f46e5; }
        .secondary { background: #222; }
        .room-info { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .code { font-size: 24px; font-weight: 700; color: #6366f1; letter-spacing: 2px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="view-init" class="view active">
        <h2>Who are you?</h2>
        <input id="name-in" placeholder="Your name...">
        <button id="btn-next">NEXT</button>
    </div>

    <div id="view-action" class="view">
        <h2>Hello, <span id="user-name-label"></span>!</h2>
        <button id="btn-create">CREATE ROOM</button>
        <div style="text-align: center; color: #555;">- or -</div>
        <input id="join-code-in" placeholder="Enter Room Code">
        <button id="btn-join" class="secondary">JOIN ROOM</button>
    </div>

    <div id="view-room" class="view">
        <div class="room-info">
            <div style="font-size: 11px; color: #555;">ROOM CODE</div>
            <div id="room-code-display" class="code">------</div>
            <button id="btn-copy" class="secondary" style="width: 100%;">COPY CODE</button>
            <button id="btn-leave" style="background: #ef4444; width: 100%;">LEAVE ROOM</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
