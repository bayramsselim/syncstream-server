<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncStream Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="star-container" class="cosmic-bg"></div>
    
    <div class="glass-container">
        <header>
            <div class="logo">
                <div class="play-icon"></div>
                <h1>SyncStream <span style="color:var(--accent); font-size:10px;">PRO</span></h1>
            </div>
            <div class="status-indicator" id="connection-status"></div>
        </header>

        <main>
            <!-- 🪐 Giriş Ekranı -->
            <div id="join-view" class="view">
                <div class="welcome-text">
                    Watch videos together, <br> synced in real-time.
                </div>
                
                <div class="input-group">
                    <label>DISPLAY NAME</label>
                    <input type="text" id="username-input" placeholder="How should we call you?" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>ROOM CODE (OPTIONAL)</label>
                    <input type="text" id="room-input" placeholder="Enter code to join" maxlength="6" autocomplete="off">
                </div>
                
                <div class="action-buttons">
                    <button id="main-action-btn" class="btn primary-btn">START WATCHING</button>
                    <div id="create-hint" style="font-size:10px; color:var(--text-dim); text-align:center;">
                        No code? We'll create a new room for you.
                    </div>
                </div>
            </div>

            <!-- 🛸 Aktif Oda Ekranı -->
            <div id="room-view" class="view" style="display: none;">
                <div class="room-card">
                    <span class="room-label">SHARE THIS CODE</span>
                    <div class="room-code" id="current-room-code">----</div>
                    <div style="display:flex; gap:8px; width:100%;">
                        <button id="copy-code-btn" class="share-btn" style="flex:1">Copy Code</button>
                        <button id="copy-link-btn" class="share-btn" style="flex:1">Copy Link</button>
                    </div>
                </div>

                <div class="section-label">PEOPLE IN ROOM</div>
                <div id="user-list" class="user-list"></div>

                <div class="now-playing-box">
                    <div class="section-label">NOW WATCHING</div>
                    <div id="now-playing-title" class="np-title">Scanning...</div>
                </div>

                <div class="host-control" id="host-controls" style="display: none;">
                    <input type="checkbox" id="host-control-only">
                    <label for="host-control-only">Only host can control video</label>
                </div>

                <button id="leave-btn" class="btn danger-btn">Leave Room</button>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
